<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be_Vietnam_Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#FF8C00",
                        "secondary": "#7C4DFF",
                        "tertiary": "#00B0FF",
                        "background": "#0F172A",
                        "surface": "#1E293B",
                        "accent-pink": "#FF4081",
                        "game-gold": "#FFD700",
                        "game-gem": "#00E5FF"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .node-3d {
            box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.3), 
                        0 10px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #7C4DFF 0%, #4527A0 100%);
        }
        .node-active-glow {
            box-shadow: 0 0 30px rgba(255, 140, 0, 0.5), 
                        0 0 60px rgba(255, 140, 0, 0.2),
                        inset 0 4px 8px rgba(255, 255, 255, 0.4);
            background: linear-gradient(135deg, #FF8C00 0%, #E65100 100%);
        }
        .path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .no-scrollbar::-webkit-scrollbar { display: none }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none }
        
        .chunky-button {
            box-shadow: 0 6px 0 #935100, 0 12px 20px rgba(255, 140, 0, 0.4);
            transition: all 0.1s ease;
        }
        .chunky-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #935100, 0 4px 10px rgba(255, 140, 0, 0.2);
        }
        
        @keyframes flow {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }
        .animated-path {
            animation: flow 2s linear infinite;
        }
        
        /* Optimization for taller aspect ratios (like 19.5:9 or 20:9) */
        @media (min-aspect-ratio: 9/18) {
            .level-container {
                gap: 4rem;
                padding-bottom: 22rem;
            }
        }
    </style>
</head>
<body class="bg-background font-body text-slate-100 overflow-hidden h-[100dvh] w-full select-none">
<!-- Decorative Top Bar - Compacted for mobile -->
<header class="bg-slate-900/80 backdrop-blur-md border-b border-white/10 w-full top-0 sticky z-50 flex justify-between items-center px-4 py-3">
<div class="flex items-center gap-1.5 bg-slate-800/60 rounded-full px-3 py-1.5 border border-white/5">
<span class="material-symbols-outlined text-rose-500 text-lg" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-headline font-extrabold text-white text-xs">5/5</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center">
<h1 class="text-sm font-black text-white font-headline tracking-widest uppercase">MACERA YOLU</h1>
<div class="h-0.5 w-8 bg-primary rounded-full mt-0.5 opacity-60"></div>
</div>
<div class="flex items-center gap-2">
<div class="flex items-center gap-1 bg-slate-800/80 rounded-lg px-2 py-1 border border-white/5 shadow-inner">
<span class="material-symbols-outlined text-game-gem text-base" style="font-variation-settings: 'FILL' 1;">diamond</span>
<span class="text-[10px] font-black">24</span>
</div>
<div class="flex items-center gap-1 bg-slate-800/80 rounded-lg px-2 py-1 border border-white/5 shadow-inner">
<span class="material-symbols-outlined text-game-gold text-base" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
<span class="text-[10px] font-black">345</span>
</div>
</div>
</header>
<!-- Main Game Canvas -->
<main class="relative h-[calc(100dvh-60px)] w-full overflow-hidden flex flex-col bg-[#0b101b]">
<!-- Background with deep gradients -->
<div class="absolute inset-0 z-0 opacity-40 scale-110" style="background-image: radial-gradient(circle at 50% 50%, #2D1B69 0%, #0F172A 100%), url('https://lh3.googleusercontent.com/aida-public/AB6AXuAOl9F_QknHkztfmhIljGtBQISRyrZ4usNz0iq-tebiebzYAMrEYf4mNDyy-HlKF-BegKvg3StHX3bCOgN7n-DEjMSG1RoMqX4DIjnRpYoDjcE8ENrUolLxjqFLM8gTaqcFuaVSkGS69GkaorXLS864ZM9XhEm0DrkavondJ7HJgmx_rg1o5ePs3Lo4ukTCnXVKEqkouiGIH_Drbm-BzYSaeX1uUONzT23YXVje4IRN4slkzeEvOZiiaJu3kv8wWw2XzHPThYmf9bQ'); background-size: cover; background-position: center; mix-blend-mode: overlay;"></div>
<!-- Level Path Container -->
<div class="relative z-10 w-full h-full p-6 flex flex-col items-center overflow-y-auto no-scrollbar pt-16 level-container pb-[450px] gap-16">
<!-- Animated Magic Path - Adjusted for longer aspect ratios -->
<svg class="path-svg" preserveaspectratio="none" viewbox="0 0 400 1600">
<defs>
<filter id="glow">
<fegaussianblur result="blur" stddeviation="4"></fegaussianblur>
<fecomposite in="SourceGraphic" in2="blur" operator="over"></fecomposite>
</filter>
<lineargradient id="pathGrad" x1="0%" x2="0%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#7C4DFF"></stop>
<stop offset="100%" stop-color="#FF8C00"></stop>
</lineargradient>
</defs>
<path class="animated-path" d="M220,50 C220,150 150,180 150,300 C150,420 250,450 250,600 C250,750 180,850 180,1000" fill="none" filter="url(#glow)" stroke="url(#pathGrad)" stroke-dasharray="15 25" stroke-linecap="round" stroke-width="6"></path>
</svg>
<!-- Level 4 (Locked Island) -->
<div class="relative group rotate-3 z-20 translate-x-12">
<div class="w-20 h-20 rounded-2xl node-3d flex flex-col items-center justify-center border-t-2 border-white/20 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-black/40 to-transparent"></div>
<span class="text-white/60 font-headline font-black text-2xl relative z-10">4</span>
<div class="absolute -top-1 -right-1 bg-slate-900 rounded-full p-1.5 border border-white/20 scale-75">
<span class="material-symbols-outlined text-slate-400 text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<div class="absolute -bottom-5 w-full h-3 bg-black/40 rounded-full blur-lg -z-10"></div>
</div>
<!-- Level 3 (Locked Island) -->
<div class="relative group -rotate-6 z-20 -translate-x-12">
<div class="w-20 h-20 rounded-2xl node-3d flex flex-col items-center justify-center border-t-2 border-white/20 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-black/40 to-transparent"></div>
<span class="text-white/60 font-headline font-black text-2xl relative z-10">3</span>
<div class="absolute -top-1 -right-1 bg-slate-900 rounded-full p-1.5 border border-white/20 scale-75">
<span class="material-symbols-outlined text-slate-400 text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<div class="absolute -bottom-5 w-full h-3 bg-black/40 rounded-full blur-lg -z-10"></div>
</div>
<!-- Level 2 (Locked Island) -->
<div class="relative group translate-x-16 rotate-2 z-20">
<div class="w-20 h-20 rounded-2xl node-3d flex flex-col items-center justify-center border-t-2 border-white/20 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-black/40 to-transparent"></div>
<span class="text-white/60 font-headline font-black text-2xl relative z-10">2</span>
<div class="absolute -top-1 -right-1 bg-slate-900 rounded-full p-1.5 border border-white/20 scale-75">
<span class="material-symbols-outlined text-slate-400 text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<div class="absolute -bottom-5 w-full h-3 bg-black/40 rounded-full blur-lg -z-10"></div>
</div>
<!-- Level 1 (Active) -->
<div class="relative group -translate-x-6 z-20">
<div class="w-28 h-28 rounded-[2rem] node-active-glow flex flex-col items-center justify-center border-t-2 border-white/40 ring-4 ring-primary/10 relative animate-bounce" style="animation-duration: 3.5s">
<span class="text-white font-headline font-black text-5xl drop-shadow-[0_4px_4px_rgba(0,0,0,0.4)]">1</span>
<div class="absolute -bottom-10 whitespace-nowrap bg-gradient-to-r from-primary to-orange-400 text-white text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-[0.2em] shadow-lg border border-white/20" style="bottom: -24px;">ŞİMDİ OYNA</div>
</div>
<div class="absolute -inset-8 bg-primary/20 rounded-full blur-2xl animate-pulse -z-10"></div>
<div class="absolute -bottom-8 w-full h-6 bg-black/50 rounded-full blur-lg -z-10"></div>
</div>
</div>
<!-- Side UI Buttons - Repositioned for standard 6-inch phone reach -->
<div class="absolute left-4 bottom-[380px] z-30 flex flex-col gap-4">
<button class="w-12 h-12 glass-panel rounded-xl shadow-xl flex items-center justify-center group active:scale-90 transition-all border-b-2 border-white/10">
<span class="material-symbols-outlined text-game-gold text-2xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">military_tech</span>
</button>
<button class="w-12 h-12 glass-panel rounded-xl shadow-xl flex items-center justify-center group active:scale-90 transition-all border-b-2 border-white/10">
<span class="material-symbols-outlined text-tertiary text-2xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
</button>
</div>
<div class="absolute right-4 bottom-[380px] z-30 flex flex-col gap-4">
<button class="w-12 h-12 glass-panel rounded-xl shadow-xl flex items-center justify-center group active:scale-90 transition-all border-b-2 border-white/10">
<span class="material-symbols-outlined text-accent-pink text-2xl group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</button>
</div>
<!-- Progress Card - Optimized for thumb zone -->
<div class="absolute left-0 right-0 z-40 px-4 bottom-[110px]">
<div class="glass-panel rounded-[2rem] p-6 shadow-[0_20px_50px_rgba(0,0,0,0.6)] flex flex-col gap-6 border border-white/10">
<div class="flex justify-between items-start">
<div class="space-y-1">
<div class="flex items-center gap-2">
<h2 class="font-headline font-extrabold text-3xl text-white">Seviye 1</h2>
<span class="material-symbols-outlined text-game-gold text-xl" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<p class="font-body text-slate-300 text-sm leading-snug max-w-[200px]">İlerleme kaydedildi. Maceraya devam etmeye hazır mısın?</p>
</div>
<div class="bg-indigo-500/20 border border-indigo-400/30 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
<span class="material-symbols-outlined text-indigo-400 text-sm" style="font-variation-settings: 'FILL' 1;">grade</span>
<span class="text-indigo-200 font-black text-[9px] uppercase tracking-wider">KOLAY</span>
</div>
</div>
<div class="flex gap-3">
<button class="w-16 bg-slate-800/80 text-white font-black py-4 rounded-xl border-b-4 border-slate-950 active:translate-y-1 active:border-b-0 transition-all">
<span class="material-symbols-outlined text-lg">refresh</span>
</button>
<button class="flex-1 chunky-button bg-gradient-to-b from-primary to-orange-600 text-white font-headline font-black py-4 rounded-xl text-lg flex items-center justify-center gap-3 uppercase tracking-tight">
                        DEVAM ET
                        <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">play_circle</span>
</button>
</div>
</div>
</div>
</main>
<!-- Optimized Mobile Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-3 bg-slate-900/98 border-t border-white/5 backdrop-blur-3xl rounded-t-[2.5rem] pb-4">
<!-- Yolculuk (Active) -->
<button class="flex flex-col items-center justify-center relative -top-5">
<div class="w-14 h-14 bg-gradient-to-b from-indigo-500 to-indigo-700 rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(79,70,229,0.4)] border-[3px] border-slate-900 ring-4 ring-indigo-500/10">
<span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">map</span>
</div>
<span class="font-headline text-[9px] font-black uppercase text-indigo-400 mt-1 tracking-widest">Yolculuk</span>
</button>
<!-- Görevler -->
<button class="flex flex-col items-center justify-center text-slate-500 px-2 py-2">
<span class="material-symbols-outlined text-2xl">task_alt</span>
<span class="font-headline text-[9px] font-bold uppercase mt-1 tracking-wide">Görevler</span>
</button>
<!-- Profil -->
<button class="flex flex-col items-center justify-center text-slate-500 px-2 py-2">
<span class="material-symbols-outlined text-2xl">shield</span>
<span class="font-headline text-[9px] font-bold uppercase mt-1 tracking-wide">Profil</span>
</button>
<!-- Mağaza -->
<button class="flex flex-col items-center justify-center text-slate-500 px-2 py-2">
<span class="material-symbols-outlined text-2xl">shopping_bag</span>
<span class="font-headline text-[9px] font-bold uppercase mt-1 tracking-wide">Mağaza</span>
</button>
</nav>
</body></html>
